# ===============================================================================
#                        AntiAFKPlus v3.0.2 Premium
#                           Configuration File
# ===============================================================================
#
# Documentation: https://github.com/koyere/AntiAFKPlus
# Discord: https://discord.gg/xKUjn3EJzR
#
# ===============================================================================

# Configuration version (DO NOT MODIFY)
version: "3.0.2"

# ===============================================================================
#  MODULE SYSTEM
# ===============================================================================
# Enable or disable individual features. Disabled modules use zero resources.

modules:
  core-detection:
    enabled: true
  core-events:
    enabled: true
  core-api:
    enabled: true
  core-commands:
    enabled: true

  # --- Pattern Detection ---
  # Detects AFK pools, water circles, confined spaces, repetitive movement.
  pattern-detection:
    enabled: true

    # Sensitivity thresholds (higher = fewer false positives)
    water-circle-radius: 5.0           # blocks (2.0 - 8.0)
    min-samples-for-pattern: 40        # samples before analysis (20 - 60)
    confined-space-threshold: 12.0     # blocks (5.0 - 20.0)
    pattern-analysis-interval-seconds: 30  # how often to analyze (20 - 60)
    repetitive-movement-threshold: 0.95    # similarity required (0.8 - 0.98)
    max-pattern-violations: 8          # violations before action (3 - 15)

    # Large pool & keystroke timeout
    large-pool-detection: true
    large-pool-threshold: 25.0
    keystroke-timeout-detection: true
    keystroke-timeout-seconds: 180

    # False positive reduction
    linear-movement-exclusion: true
    linear-movement-threshold: 0.3     # direction variance (0.1 - 0.5)
    min-direction-variance: 0.15       # minimum for repetitive detection (0.1 - 0.4)
    activity-grace-period-seconds: 60  # skip detection after active play (0 - 120)

    # Notification control
    notifications:
      notify-player-on-detection: false
      notify-player-on-violation: false
      notify-player-on-action: false
      send-to-admins: true
      admin-notification-permission: "antiafkplus.notify.patterns"

  # --- Autoclick Detection ---
  autoclick-detection:
    enabled: true
    click-window-ms: 5000
    click-threshold: 20
    min-idle-time-ms: 60000
    action: "LOG"              # LOG, SET_AFK, KICK, NONE

  # --- Player Protection ---
  player-protection:
    enabled: true

  # --- AFK Zones (requires WorldGuard) ---
  afk-zones:
    enabled: false
    require-worldguard: true
    default-zone-timeout: 300
    allow-zone-inheritance: true

  # --- Reward System ---
  reward-system:
    enabled: false

  # --- Visual Effects ---
  visual-effects:
    enabled: false

  # --- Database ---
  database:
    enabled: false

  # --- Analytics ---
  analytics:
    enabled: false

  # --- Integrations ---
  worldguard-integration:
    enabled: false
  placeholderapi-integration:
    enabled: true
  discordsrv-integration:
    enabled: false
  floodgate-integration:
    enabled: true
  folia-compatibility:
    enabled: true
  bedrock-compatibility:
    enabled: true

# ===============================================================================
#  BASIC AFK SETTINGS
# ===============================================================================

# Seconds before a player is considered AFK
default-afk-time: 300

# How often (seconds) the plugin checks for AFK players
afk-check-interval-seconds: 5

# Maximum seconds a player can stay in voluntary AFK mode (/afk)
max-voluntary-afk-time-seconds: 600

# ===============================================================================
#  AFK ACTION (Global)
# ===============================================================================
# What happens when a player exceeds the AFK time limit.
# This is the GLOBAL default action. Zone-specific actions (zone-management)
# and server-transfer override this when configured.
#
# Available actions:
#   KICK             - Kick the player from the server (default)
#   TELEPORT         - Teleport the player to a specific location
#   MARK_AFK_ONLY    - Only mark the player as AFK, no kick or teleport
#   NONE             - Do nothing (disable AFK action entirely)
#
# Examples:
#   # Kick players (default behavior):
#   afk-action:
#     type: "KICK"
#
#   # Teleport AFK players to specific coordinates:
#   afk-action:
#     type: "TELEPORT"
#     teleport-location: "world,0,100,0"
#
#   # Teleport with yaw and pitch (player facing direction):
#   afk-action:
#     type: "TELEPORT"
#     teleport-location: "world,250,76,30,90.0,0.0"
#
#   # Just mark as AFK without kicking or teleporting:
#   afk-action:
#     type: "MARK_AFK_ONLY"

afk-action:
  type: "KICK"
  teleport-location: ""
  # Worlds where players will be marked as AFK (tab list, visual effects)
  # but will NOT be teleported/kicked. Useful for spawn worlds where you
  # want the AFK tag but don't want to move players.
  exempt-worlds: []
  # Example: exempt-worlds: ["world_spawn", "hub"]

# ===============================================================================
#  WARNINGS AND TIMEOUTS
# ===============================================================================

# Warning times (seconds remaining before kick)
afk-warnings:
  - 60
  - 30
  - 10

# Permission-based AFK times (overrides default-afk-time)
permission-times:
  "antiafkplus.time.vip": 600
  "antiafkplus.time.staff": 1800
  "antiafkplus.time.premium": 900
  "antiafkplus.time.donator": 1200

# ===============================================================================
#  WORLD CONTROL
# ===============================================================================

# Worlds where AFK system is active (empty = all worlds)
enabled-worlds:
  - "world"
  - "world_nether"
  - "world_the_end"

# Worlds where AFK system is disabled (takes precedence over enabled-worlds)
disabled-worlds: []

# ===============================================================================
#  FEATURE TOGGLES
# ===============================================================================

debug: false
block-pickup-while-afk: true
broadcast-afk-state-changes: true

# ===============================================================================
#  MOVEMENT DETECTION
# ===============================================================================
# Thresholds that control what counts as "real" player activity.

movement-detection-settings:
  micro-movement-threshold: 0.1    # minimum blocks to count as movement
  head-rotation-threshold: 5.0     # minimum degrees for head rotation
  jump-spam-threshold-ms: 1000     # ms between jumps to detect spam
  max-jumps-per-period: 10         # max jumps before flagging as spam
  jump-reset-period-ms: 30000      # reset jump counter after this period

# ===============================================================================
#  ACTIVITY SCORING WEIGHTS
# ===============================================================================
# Controls how much each activity type contributes to the player's score.
# Higher weight = counts more as "active". Used for AFK detection sensitivity.

activity-scoring-weights:
  movement: 1.0
  head-rotation: 1.5
  jump: 0.8
  command: 2.0
  chat: 2.5
  interaction: 1.8
  block-break: 1.5
  block-place: 1.5
  item-use: 1.2
  combat: 2.0
  inventory: 1.3

# ===============================================================================
#  EVENT SYSTEM
# ===============================================================================
# Toggle Bukkit events for external plugin integration.
# Disabling unused events improves performance.

event-system:
  afk-state-change-events: true
  afk-warning-events: true
  afk-kick-events: true
  pattern-detection-events: true

# ===============================================================================
#  AFK TIME WINDOWS
# ===============================================================================

afk-windows:
  enabled: false
  timezone: "SERVER"               # SERVER or IANA ID (e.g. Europe/Madrid)
  ranges:
    - "08:00-12:00"
    - "20:00-23:00"
  behavior-inside-window: "SKIP_ACTIONS"  # SKIP_ACTIONS | EXTEND_THRESHOLD | MESSAGE_ONLY | DEFAULT
  behavior-outside-window: "DEFAULT"
  extend-seconds: 900
  bypass-permission: "antiafkplus.window.bypass"

# ===============================================================================
#  CREDIT SYSTEM
# ===============================================================================
# Earn AFK credits through active play. Credits delay kick/teleport when AFK.

credit-system:
  enabled: false

  credit-ratios:
    default: "5:1"                 # 5 active minutes = 1 AFK credit minute
    vip: "4:1"
    premium: "3:1"
    admin: "2:1"

  max-credits:
    default: 120
    vip: 180
    premium: 240
    admin: 480

  earning-requirements:
    minimum-session-minutes: 5
    activity-threshold: 0.3

  afk-zone:
    enabled: true
    world: "world"
    location: "0,100,0"
    protection:
      prevent-damage: false
      prevent-pvp: false
      prevent-mob-spawning: false

  notifications:
    credit-earned: true
    credit-consumed: true
    credit-exhausted: true
    low-credits-warning: true
    low-credits-threshold: 15

  return-command:
    enabled: true
    cooldown-seconds: 10
    auto-return:
      on-activity: false
      activity-delay-seconds: 30
    max-distance-from-zone: 50
    validate-original-location: true

  credit-decay:
    enabled: false
    expire-after-days: 7
    warning-days: 2
    cleanup-interval-hours: 24

  database:
    enabled: false
    save-interval-minutes: 5
    table-prefix: "afkplus_"

  integration:
    reward-system-bonus: true

# ===============================================================================
#  SERVER TRANSFER
# ===============================================================================
# Transfer AFK players to another server via BungeeCord/Velocity.

server-transfer:
  enabled: false
  target-server: ""
  proxy-channel: "auto"            # auto | bungeecord | namespaced
  fallback-action: "KICK"          # KICK | TELEPORT | NONE
  fallback-teleport-location: ""
  retry-attempts: 0
  retry-delay-ticks: 10

  countdown:
    enabled: false
    seconds: 10
    title: "&cYou are AFK"
    subtitle: "&eMoving in {seconds}s"
    sound:
      enabled: true
      name: "ENTITY_EXPERIENCE_ORB_PICKUP"
      volume: 1.0
      pitch: 1.0

  pipeline:
    enabled: false
  actions: []

# ===============================================================================
#  PLAYER PROTECTION
# ===============================================================================

player-protection:
  prevent-movement-while-afk: false
  movement-restriction-message: true

  invulnerability-enabled: true
  invulnerability-delay-ms: 5000
  damage-types-blocked:
    - "FALL"
    - "DROWNING"
    - "FIRE"
    - "LAVA"
  prevent-pvp-invulnerability: true

  block-inventory-access: true
  block-command-execution: false
  command-whitelist:
    - "/afk"
    - "/help"
    - "/spawn"
  prevent-block-interaction: true

# ===============================================================================
#  ZONE MANAGEMENT
# ===============================================================================
# Define zones with custom AFK behavior. Each zone can have its own timeout,
# action, and teleport location.
#
# WITHOUT WorldGuard: All players are matched against the FIRST zone that has
# no region restrictions. Use this for simple setups where you want a single
# custom action (e.g., teleport all AFK players to a location).
#
# WITH WorldGuard: Players are matched to zones based on the WorldGuard region
# they are standing in. The zone name must match a WorldGuard region name.
#
# NOTE: If you only need a simple global teleport/action, use the "afk-action"
# setting above instead. Zone management is for advanced per-region behavior.
#
# Available kick-action values:
#   KICK             - Kick the player from the server
#   TELEPORT         - Teleport to the specified teleport-location
#   TRANSFER_SERVER  - Transfer to another BungeeCord/Velocity server
#   MARK_AFK_ONLY    - Only mark as AFK, no kick or teleport
#   GAMEMODE         - Change the player's gamemode
#   COMMAND          - Execute a custom command
#
# teleport-location format: "world,x,y,z" or "world,x,y,z,yaw,pitch"

zone-management:
  enabled: false
  require-worldguard: false
  default-afk-allowed: true
  default-timeout-seconds: 300
  allow-region-inheritance: true

  zones:
    spawn:
      afk-allowed: false
      timeout-seconds: 60
      kick-action: "TELEPORT"
      teleport-location: "world,0,100,0"
    afk-pool:
      afk-allowed: true
      timeout-seconds: 3600
      rewards-enabled: true
      reward-multiplier: 1.5

# ===============================================================================
#  REWARD SYSTEM
# ===============================================================================

reward-system:
  enabled: false
  require-vault: false

  intervals:
    5:
      commands:
        - "eco give {player} 10"
      messages:
        - "&aYou received $10 for being AFK!"
    15:
      commands:
        - "eco give {player} 50"
        - "give {player} diamond 1"
      messages:
        - "&aYou received $50 and a diamond!"

  max-daily-rewards: 144
  require-active-time-minutes: 30
  account-age-requirement-days: 1
  playtime-requirement-hours: 5
  ip-based-limits: true

# ===============================================================================
#  VISUAL EFFECTS
# ===============================================================================

visual-effects:
  enabled: false

  holograms:
    enabled: false
    provider: "DecentHolograms"
    height-offset: 2.5
    update-interval-seconds: 5
    show-to-all-players: true
    per-player-visibility: false
    lines:
      - "&c[AFK]"
      - "&7{player}"
      - "&eAFK for {time}"

  particles:
    enabled: false
    type: "CLOUD"
    count: 5
    speed: 0.1
    offset-x: 0.5
    offset-y: 1.0
    offset-z: 0.5
    update-interval-ticks: 20

  tab-list:
    enabled: true
    afk-prefix: "&7[AFK] "
    afk-suffix: ""

  name-tags:
    enabled: false
    afk-prefix: "&7[AFK] "
    afk-suffix: ""

# ===============================================================================
#  DATABASE
# ===============================================================================

database:
  enabled: false
  type: "SQLite"                   # SQLite, MySQL, H2

  sqlite:
    file-name: "antiafkplus.db"
    connection-timeout: 30000

  mysql:
    host: "localhost"
    port: 3306
    database: "antiafkplus"
    username: "root"
    password: "password"
    connection-pool-size: 5
    connection-timeout: 30000
    ssl: false

  h2:
    file-name: "antiafkplus"
    memory-mode: false

  data-retention-days: 30
  cleanup-interval-hours: 24
  backup-enabled: true
  backup-interval-hours: 6

# ===============================================================================
#  ANALYTICS
# ===============================================================================

analytics:
  enabled: false
  collect-player-statistics: true
  collect-performance-metrics: true
  collect-pattern-data: true
  generate-daily-reports: true
  generate-weekly-reports: true
  export-format: "JSON"            # JSON, CSV, XML

# ===============================================================================
#  INTERNATIONALIZATION
# ===============================================================================

internationalization:
  default-language: "en"
  auto-detect-language: true
  fallback-to-default: true
  cache-messages: true
  development-mode: false

# ===============================================================================
#  BEDROCK COMPATIBILITY
# ===============================================================================

bedrock-compatibility:
  enabled: true
  adapt-menus: true
  adapt-messages: true
  adapt-hotkeys: true
  adapt-item-interactions: true
  custom-detection: true

  detection-methods:
    floodgate: true
    geyser: true
    username-prefix: true
    client-brand: true

  ui-adaptations:
    max-menu-slots: 27
    use-simple-layouts: true
    avoid-shift-click: true
    use-touch-friendly-buttons: true

  message-adaptations:
    shorter-messages: true
    max-length: 100
    avoid-complex-formatting: true
    use-actionbar-sparingly: true

# ===============================================================================
#  PERFORMANCE
# ===============================================================================

performance:
  auto-optimization: true
  adaptive-intervals: true
  memory-optimization: true
  cpu-optimization: true
  network-optimization: true

  thresholds:
    max-tps-impact: 0.5
    max-memory-mb: 50
    max-cpu-percent: 5

  optimization-interval: 5000

  advanced:
    use-object-pooling: true
    cache-calculations: true
    batch-operations: true
    async-processing: true

  player-categorization:
    enabled: true
    high-activity-threshold: 10
    low-activity-threshold: 2

  debug-logging: false

# ===============================================================================
#  INTEGRATIONS
# ===============================================================================

integrations:
  placeholderapi:
    enabled: true
    custom-placeholders:
      - "%antiafkplus_status%"
      - "%antiafkplus_afktime%"
      - "%antiafkplus_activity_score%"
      - "%antiafkplus_pattern_confidence%"
      - "%antiafkplus_credits%"
      - "%antiafkplus_credits_rank%"

  worldguard:
    enabled: false
    region-flags:
      - "afk-allowed"
      - "afk-timeout"
      - "afk-rewards"

  vault:
    enabled: false

  discordsrv:
    enabled: false
    send-afk-notifications: true
    send-pattern-alerts: true

  floodgate:
    enabled: true
    adapt-ui-for-bedrock: true
    detect-input-mode: true

# ===============================================================================
#  PERMISSIONS
# ===============================================================================

permissions:
  list-command-permission: "antiafkplus.list"
  admin-commands: "antiafkplus.admin"
  reload-config: "antiafkplus.reload"
  view-statistics: "antiafkplus.stats"
  bypass-all: "antiafkplus.bypass"
  bypass-detection: "antiafkplus.bypass.detection"
  bypass-patterns: "antiafkplus.bypass.patterns"
  bypass-autoclick: "antiafkplus.bypass.autoclick"
  bypass-item-pickup: "antiafkplus.bypass.itempickup"
